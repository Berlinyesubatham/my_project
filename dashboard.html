<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Enquiries</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 1000px;
    margin: 50px auto;
    padding: 20px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #1e3c72;
    margin-bottom: 25px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

table th, table td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

table th {
    background: #1e3c72;
    color: #fff;
    font-weight: 600;
}

table tr:hover {
    background: #f1f5f9;
}

a.logout-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #1e3c72;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

a.logout-btn:hover {
    background: #163060;
}

@media (max-width: 768px) {
    table th, table td {
        padding: 10px;
        font-size: 14px;
    }
    .container {
        margin: 20px;
        padding: 15px;
    }
}
</style>
</head>
<body>

<div class="container">
   <h2>All Enquiries</h2>
<table border="1">
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Mobile</th>
    <th>Address</th>
    <th>Source</th>
    <th>Action</th>
  </tr>
  {% for row in data %}
  <tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>
      <a href="/delete/{{ row[0] }}" class="delete-btn" onclick="return confirm('Are you sure you want to delete this enquiry?');">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
<a href="/logout">Logout</a>

</div>

</body>
</html>
