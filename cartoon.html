/* Navbar links */

  transition: color 0.3s ease, background-color 0.3s ease;
}

.navbar-nav .nav-link:hover,
.navbar-nav .nav-link.active {
  color: #ffc107 !important;
  font-weight: 600;
}

/* Dropdown Menu */
.dropdown-menu {
  border-radius: 8px;
  border: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.dropdown-item {
  padding: 8px 15px;
  transition: 0.3s;
}

.dropdown-item:hover {
  background-color: #ffc107;
  color: white;
}

/* Submenu for desktop */
.dropdown-submenu {
  position: relative;
}

.dropdown-submenu > .dropdown-menu {
  top: 0;
  left: 100%;
  margin-left: 0.1rem;
  border-radius: 0.25rem;
}

/* Mobile fix: dropdown submenu drops below parent */
@media (max-width: 991px) {
  .navbar-nav .dropdown-menu {
    position: static !important;
    width: 100% !important;
    background-color: #1f2a36 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    margin: 0 !important;       /* Remove any margin */
    padding: 0 !important;      /* Remove padding */
  }

    color: white !important;
    background-color: #1f2a36 !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);

    border-radius: 0 !important;

/* ---------- 3-D Card ---------- */
:root{
    --board-height:300px;
    --board-width:calc(var(--board-height) / 1.5);
}
*{ box-sizing:border-box; }

.board{
    width:var(--board-width);
    height:var(--board-height);
    position:relative;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding:0 36px;
    perspective:2500px;
    border-radius:5px;
}
.cover-image{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:5px;
}
.wrapper{
    transition:all 0.5s;
    position:absolute;
    width:100%;
    z-index:-1;
    border-radius:5px;
}
.board:hover .wrapper{
    transform:perspective(900px) translateY(-5%) rotateX(25deg);
    box-shadow:2px 35px 32px -8px var(--card-shadow);
}
.wrapper::before,
.wrapper::after{
    content:"";
    opacity:0;
    width:100%;
    height:80px;
    transition:all 0.5s;
    position:absolute;
    left:0;
    border-radius:5px;
}
.wrapper::before{
    top:0;
    height:100%;
    background-image:linear-gradient(
        to top,
        transparent 46%,
        rgba(12,13,19,0.5) 68%,
        rgba(12,13,19) 97%
    );
}
.wrapper::after{
    bottom:0;
    opacity:1;
    background-image:linear-gradient(
        to bottom,
        transparent 46%,
        rgba(12,13,19,0.5) 68%,
        rgba(12,13,19) 97%
    );
}
.board:hover .wrapper::before,
.board:hover .wrapper::after{
    opacity:1;
}
.board:hover .wrapper::after{
    height:120px;
}
.title{
    width:100%;
    transition:transform 0.5s;
}
.board:hover .title{
    transform:translate3d(0,-50px,100px);
}
.character{
    width:100%;
    opacity:0;
    transition:all 0.5s;
    position:absolute;
    z-index:-1;
}
.board:hover .character{
    opacity:1;
    transform:translate3d(0,-30%,100px);
}
